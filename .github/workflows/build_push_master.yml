name: CI build

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    name: Build artifacts and deploy preview
    if: "!startsWith(github.event.head_commit.message, '[SKIP CI]')"
    runs-on: ubuntu-latest

    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up NodeJs
        uses: actions/setup-node@v4
        with:
          node-version-file: './package.json'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      - name: Build webUI
        run: |
          yarn ci
          yarn build
          yarn build-zip
          yarn build-md5
          ls buildZip

      - name: Generate Tag Name
        id: GenTagName
        run: |
          cd build
          genTag="r$(git rev-list HEAD --count)"
          echo "$genTag"
          echo "tag=$genTag" >> "$GITHUB_OUTPUT"

      - name: Update index.json
        run: |
          TAG="${{ steps.GenTagName.outputs.value }}"
          echo "{ \"latest\": \"$TAG\" }" > index.json
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add index.json
          git commit -m "Updated to $TAG" || echo "No changes to commit"
          git push origin master

      - name: Upload CI Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ github.token }}
          artifacts: "buildZip/*"
          tag: ${{ steps.GenTagName.outputs.value }}
          allowUpdates: true
